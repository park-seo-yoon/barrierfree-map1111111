    /* 지도 전체 크기 */
    #map {

    }

/* 두 번째 팝업 전체 컨테이너 */
.leaflet-popup-content .popup-container {
  max-height: 500px;      /* 팝업 최대 높이 설정 */
  overflow-y: auto;       /* 내용이 많으면 스크롤 */
  width: 350px;           /* 원하는 가로 크기 조정 */
  padding: 5px 40px 5px 5px;
  box-sizing: border-box;
}

/* 카드 간 간격 조정 */
.popup-card {
  margin-bottom: 10px;
}

.popup-wrapper {
  max-width: 500px;
}

/* 제목 */
.popup-title {
  font-size: 24px;
  font-weight: bold;
  line-height: 2;
  color: #222;
}

/* 설명 */
.popup-desc {
  font-size: 14px;
  color: #555;
  line-height: 1.4;
}

/* 링크 */
.popup-link {
  color: #0066ff;
  text-decoration: underline;
  font-size: 13px;
  line-height: 2;
}

/* 이미지 스타일 */
.popup-img {
  width: 20%;          /* width=200 같은 고정값 대신 반응형 */
  max-width: 220px;     /* 팝업 안에서 넘치지 않도록 */
  margin-top: 5px;
  margin-bottom: 10px;
  border-radius: 8px;
  display: block;
}

    .popup-card {
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .popup-card img {
      width: 15%;
      height: auto;
      display: block;
      margin-top: 25px;
      margin-left: 25px;
      border-radius: 6px;
    }
    .popup-card-content {
      padding: 10px 20px;
    }
    .popup-card-content h4 {
      margin: 8px 0;
      font-size: 24px;
      color: #333;
    }
    .popup-card-content p {
      font-size: 16px;
      color: #666;

    }



    .popup-btn {
  margin-top: 10px;

  border: none;
  background-color: #7d48ff;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
}

.popup-btn:hover {
  background-color: #5a2ed0;
}
